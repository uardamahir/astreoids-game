<!DOCTYPE html>

<html>
<head>
    <meta charset="utf-8" />
    <title>Asteroids</title>
</head>

<body>
	<canvas id="gameCanvas" width="700" height="500"></canvas>
	<script>
		const FPS = 30;
		const FRICTION = 0.7;
		const ROIDS_NUM = 3;
		const ROIDS_JAG = 0.4;
		const ROIDS_SIZE = 100;
		const ROIDS_SPD = 50;
		const LASER_EXPLODE_DUR = 0.1;
		const SHIP_INV_DUR = 3;
		const SHIP_BLINK_DUR = 0.1;
		const ROIDS_VERT = 10;
		const SHIP_SIZE = 30;
		const SHIP_EXPLODE_DUR = 0.3;
		const SHIP_THRUST = 5;
		const TURN_SPEED = 360;
		const SHOW_BOUNDING = false;
		const SHOW_CENTER_DOT = false;
		const LASER_MAX = 10;
		const LASER_SPEED = 500;
		const LASER_DIST = 0.6;
		const TEXT_FADE_TIME = 2.5;
		const TEXT_SIZE = 40;
		const GAME_LIVES = 3;
		const ROID_PTS_LGE = 20;
		const ROID_PTS_MED = 50;
		const ROID_PTS_SML = 100;
		const SAVE_KEY_SCORE = "highscore";
		const SOUND_ON = true;
		const MUSIC_ON = true;

		// benim eklemelerim
		const POWERUP_LIFE_SIZE = 20;
		const POWERUP_LIFE_DUR = 10;
		const POWERUP_LIFE_CHANCE = 0.2;
		const POWERUP_FAST_DUR = 5;
		const POWERUP_FAST_CHANCE = 0.3;
		const POWERUP_SHIELD_CHANCE = 0.3;

		var canv = document.getElementById("gameCanvas");
		var ctx = canv.getContext("2d");

		var fxLaser = new Sound("sounds/laser.m4a", 5, 0.1);
		var fxExplode = new Sound("sounds/explode.m4a", 1, 0.1);
		var fxHit = new Sound("sounds/hit.m4a", 5, 0.1);
		var fxThrust = new Sound("sounds/thrust.m4a", 1, 0.1);

		var music = new Music("sounds/music-low.m4a", "sounds/music-high.m4a");
		var roidsLeft, roidsTotal;

		var level, roid, lives, score, scoreHigh, ship, text, textAlpha;

		// power-up değişkenleri
		var lifePowerUp = null;
		var fastFirePowerUp = null;
		var shieldPowerUp = null;
		var fastFireTimer = 0;
		var shieldActive = false;

		newGame();

		document.addEventListener("keydown", keyDown);
		document.addEventListener("keyup", keyUp);

		setInterval(update, 1000 / FPS);

		function createAstreoidBelt() {
			roids = [];
			roidsTotal = (ROIDS_NUM + level) * 7;
			roidsLeft = roidsTotal;
			var x, y;
			for (var i = 0; i < ROIDS_NUM + level; i++) {
				do {
					x = Math.floor(Math.random() * canv.width);
					y = Math.floor(Math.random() * canv.height);
				} while (distBetweenPoints(ship.x, ship.y, x, y) < ROIDS_SIZE * 2 + ship.r);
				roids.push(newAstreoid(x, y, Math.ceil(ROIDS_SIZE / 2)));
			}
		}

		function destroyAsteroid(index) {
			var x = roids[index].x;
			var y = roids[index].y;
			var r = roids[index].r;

			if (r == Math.ceil(ROIDS_SIZE / 2)) {
				roids.push(newAstreoid(x, y, Math.ceil(ROIDS_SIZE / 4)));
				roids.push(newAstreoid(x, y, Math.ceil(ROIDS_SIZE / 4)));
				score += ROID_PTS_LGE;
			} else if (r == Math.ceil(ROIDS_SIZE / 4)) {
				roids.push(newAstreoid(x, y, Math.ceil(ROIDS_SIZE / 8)));
				roids.push(newAstreoid(x, y, Math.ceil(ROIDS_SIZE / 8)));
				score += ROID_PTS_MED;
			} else {
				score += ROID_PTS_SML;
			}

			if (score > scoreHigh) {
				scoreHigh = score;
				localStorage.setItem(SAVE_KEY_SCORE, scoreHigh);
			}

			roids.splice(index, 1);
			fxHit.play();

			roidsLeft--;
			music.setAstreoidRatio(roidsLeft == 0 ? 1 : roidsLeft / roidsTotal);

			if (roids.length == 0) {
				level++;
				newLevel();
			}
		}

		function distBetweenPoints(x1, y1, x2, y2) {
			return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
		}

		function drawShip(x, y, a, colour = "white") {
			ctx.strokeStyle = colour;
			ctx.lineWidth = SHIP_SIZE / 20;
			ctx.beginPath();
			ctx.moveTo(
				x + 4 / 3 * ship.r * Math.cos(a),
				y - 4 / 3 * ship.r * Math.sin(a)
			);
			ctx.lineTo(
				x - ship.r * (2 / 3 * Math.cos(a) + Math.sin(a)),
				y + ship.r * (2 / 3 * Math.sin(a) - Math.cos(a))
			);
			ctx.lineTo(
				x - ship.r * (2 / 3 * Math.cos(a) - Math.sin(a)),
				y + ship.r * (2 / 3 * Math.sin(a) + Math.cos(a))
			);
			ctx.closePath();
			ctx.stroke();
		}

		function explodeShip() {
			ship.explodeTime = Math.ceil(SHIP_EXPLODE_DUR * FPS);
			fxExplode.play();
		}

		function gameOver() {
			ship.dead = true;
			text = "Game Over";
			textAlpha = 1.0;
		}

		function keyDown(/** @type {KeyboardEvent}*/ ev) {
			if (ship.dead) return;
			switch (ev.keyCode) {
				case 32: shootLaser(); break;
				case 37: ship.rot = TURN_SPEED / 180 * Math.PI / FPS; break;
				case 38: ship.thrusting = true; break;
				case 39: ship.rot = -TURN_SPEED / 180 * Math.PI / FPS; break;
			}
		}

		function keyUp(ev) {
			if (ship.dead) return;
			switch (ev.keyCode) {
				case 32: ship.canShoot = true; break;
				case 37: ship.rot = 0; break;
				case 38: ship.thrusting = false; break;
				case 39: ship.rot = 0; break;
			}
		}

		function newAstreoid(x, y, r) {
			var lvlMul = 1 + 0.1 * level;
			var roid = {
				x: x, y: y,
				xv: Math.random() * ROIDS_SPD * lvlMul / FPS * (Math.random() < 0.5 ? 1 : -1),
				yv: Math.random() * ROIDS_SPD * lvlMul / FPS * (Math.random() < 0.5 ? 1 : -1),
				r: r,
				a: Math.random() * Math.PI * 2,
				vert: Math.floor(Math.random() * (ROIDS_VERT + 1) + ROIDS_VERT / 2),
				offs: []
			};
			for (var i = 0; i < roid.vert; i++) {
				roid.offs.push(Math.random() * ROIDS_JAG * 2 + 1 - ROIDS_JAG);
			}
			return roid;
		}

		function newGame() {
			level = 0;
			score = 0;
			lives = GAME_LIVES;
			ship = newShip();
			fastFireTimer = 0;
			shieldActive = false;
			lifePowerUp = null;
			fastFirePowerUp = null;
			shieldPowerUp = null;

			var scoreStr = localStorage.getItem(SAVE_KEY_SCORE);
			scoreHigh = scoreStr == null ? 0 : parseInt(scoreStr);
			newLevel();
		}

		function newLevel() {
			text = "Level " + (level + 1);
			textAlpha = 1.0;
			createAstreoidBelt();
			spawnLifePowerUp();
			spawnFastFirePowerUp();
			spawnShieldPowerUp();
		}

		function newShip() {
			return {
				x: canv.width / 2,
				y: canv.height / 2,
				a: 90 / 180 * Math.PI,
				r: SHIP_SIZE / 2,
				blinkNum: Math.ceil(SHIP_INV_DUR / SHIP_BLINK_DUR),
				blinkTime: Math.ceil(SHIP_BLINK_DUR * FPS),
				canShoot: true,
				explodeTime: 0,
				dead: false,
				lasers: [],
				rot: 0,
				thrusting: false,
				thrust: { x: 0, y: 0 }
			};
		}

		function shootLaser() {
			var maxLasers = fastFireTimer > 0 ? LASER_MAX * 2 : LASER_MAX;
			var laserSpeed = fastFireTimer > 0 ? LASER_SPEED * 1.5 : LASER_SPEED;

			if (ship.canShoot && ship.lasers.length < maxLasers) {
				ship.lasers.push({
					x: ship.x + 4 / 3 * ship.r * Math.cos(ship.a),
					y: ship.y - 4 / 3 * ship.r * Math.sin(ship.a),
					xv: laserSpeed * Math.cos(ship.a) / FPS,
					yv: -laserSpeed * Math.sin(ship.a) / FPS,
					dist: 0,
					explodeTime: 0
				});
				fxLaser.play();
			}
			ship.canShoot = false;
		}

		// --- POWER-UP FONKSİYONLARI ---

		function spawnLifePowerUp() {
			lifePowerUp = Math.random() < POWERUP_LIFE_CHANCE ? {
				x: Math.random() * canv.width,
				y: Math.random() * canv.height,
				r: POWERUP_LIFE_SIZE,
				timer: POWERUP_LIFE_DUR * FPS
			} : null;
		}

		function spawnFastFirePowerUp() {
			fastFirePowerUp = Math.random() < POWERUP_FAST_CHANCE ? {
				x: Math.random() * canv.width,
				y: Math.random() * canv.height,
				r: POWERUP_LIFE_SIZE,
				timer: POWERUP_LIFE_DUR * FPS
			} : null;
		}

		function spawnShieldPowerUp() {
			shieldPowerUp = Math.random() < POWERUP_SHIELD_CHANCE ? {
				x: Math.random() * canv.width,
				y: Math.random() * canv.height,
				r: POWERUP_LIFE_SIZE,
				timer: POWERUP_LIFE_DUR * FPS
			} : null;
		}

		function drawLifePowerUp() {
			if (!lifePowerUp) return;
			var x = lifePowerUp.x, y = lifePowerUp.y, r = lifePowerUp.r;
			ctx.beginPath();
			ctx.arc(x, y, r, 0, Math.PI * 2);
			ctx.fillStyle = "rgba(0, 200, 0, 0.2)";
			ctx.fill();
			ctx.strokeStyle = "lime";
			ctx.lineWidth = 2;
			ctx.stroke();
			ctx.fillStyle = "lime";
			ctx.font = "bold " + r + "px Arial";
			ctx.textAlign = "center";
			ctx.textBaseline = "middle";
			ctx.fillText("♥", x, y);
		}

		function drawFastFirePowerUp() {
			if (!fastFirePowerUp) return;
			var x = fastFirePowerUp.x, y = fastFirePowerUp.y, r = fastFirePowerUp.r;
			ctx.beginPath();
			ctx.arc(x, y, r, 0, Math.PI * 2);
			ctx.fillStyle = "rgba(255, 200, 0, 0.2)";
			ctx.fill();
			ctx.strokeStyle = "yellow";
			ctx.lineWidth = 2;
			ctx.stroke();
			ctx.fillStyle = "yellow";
			ctx.font = "bold " + r + "px Arial";
			ctx.textAlign = "center";
			ctx.textBaseline = "middle";
			ctx.fillText("⚡", x, y);
		}

		function drawShieldPowerUp() {
			if (!shieldPowerUp) return;
			var x = shieldPowerUp.x, y = shieldPowerUp.y, r = shieldPowerUp.r;
			ctx.beginPath();
			ctx.arc(x, y, r, 0, Math.PI * 2);
			ctx.fillStyle = "rgba(0, 150, 255, 0.2)";
			ctx.fill();
			ctx.strokeStyle = "cyan";
			ctx.lineWidth = 2;
			ctx.stroke();
			ctx.fillStyle = "cyan";
			ctx.font = "bold " + r + "px Arial";
			ctx.textAlign = "center";
			ctx.textBaseline = "middle";
			ctx.fillText("🛡️", x, y);
		}

		function Sound(src, maxStreams = 1, vol = 1.0) {
			this.streamNum = 0;
			this.streams = [];
			for (var i = 0; i < maxStreams; i++) {
				this.streams.push(new Audio(src));
				this.streams[i].volume = vol;
			}
			this.play = function () {
				if (SOUND_ON) {
					this.streamNum = (this.streamNum + 1) % maxStreams;
					this.streams[this.streamNum].play();
				}
			};
			this.stop = function () {
				this.streams[this.streamNum].pause();
				this.streams[this.streamNum].currentTime = 0;
			};
		}

		function Music(srcLow, srcHigh) {
			this.soundLow = new Audio(srcLow);
			this.soundHigh = new Audio(srcHigh);
			this.low = true;
			this.tempo = 1.0;
			this.beatTime = 0;
			this.play = function () {
				if (MUSIC_ON) {
					if (this.low) this.soundLow.play();
					else this.soundHigh.play();
					this.low = !this.low;
				}
			};
			this.setAstreoidRatio = function (ratio) {
				this.tempo = 1.0 - 0.75 * (1.0 - ratio);
			};
			this.tick = function () {
				if (this.beatTime == 0) {
					this.play();
					this.beatTime = Math.ceil(this.tempo * FPS);
				} else {
					this.beatTime--;
				}
			};
		}

		function update() {
			var blinkOn = ship.blinkNum % 2 == 0;
			var exploding = ship.explodeTime > 0;

			music.tick();

			// --- CAN AZALDIKÇA ARKAPLAN KIRMIZIYA DÖNER ---
			var danger = 1 - (lives / GAME_LIVES);
			var bgRed = Math.floor(80 * danger);
			ctx.fillStyle = "rgb(" + bgRed + ", 0, 0)";
			ctx.fillRect(0, 0, canv.width, canv.height);

			// astreoitleri çiz
			for (var i = 0; i < roids.length; i++) {
				ctx.strokeStyle = "slategrey";
				ctx.lineWidth = SHIP_SIZE / 20;
				var x = roids[i].x, y = roids[i].y, r = roids[i].r;
				var a = roids[i].a, vert = roids[i].vert, offs = roids[i].offs;

				ctx.beginPath();
				ctx.moveTo(x + r * offs[0] * Math.cos(a), y + r * offs[0] * Math.sin(a));
				for (var j = 1; j < vert; j++) {
					ctx.lineTo(
						x + r * offs[j] * Math.cos(a + j * Math.PI * 2 / vert),
						y + r * offs[j] * Math.sin(a + j * Math.PI * 2 / vert)
					);
				}
				ctx.closePath();
				ctx.stroke();

				if (SHOW_BOUNDING) {
					ctx.strokeStyle = "lime";
					ctx.beginPath();
					ctx.arc(x, y, r, 0, Math.PI * 2, false);
					ctx.stroke();
				}
			}

			// thrust
			if (ship.thrusting && !ship.dead) {
				ship.thrust.x += SHIP_THRUST * Math.cos(ship.a) / FPS;
				ship.thrust.y -= SHIP_THRUST * Math.sin(ship.a) / FPS;
				fxThrust.play();

				if (!exploding && blinkOn) {
					ctx.fillStyle = "red";
					ctx.strokeStyle = "yellow";
					ctx.lineWidth = SHIP_SIZE / 10;
					ctx.beginPath();
					ctx.moveTo(
						ship.x - ship.r * (2 / 3 * Math.cos(ship.a) + 0.5 * Math.sin(ship.a)),
						ship.y + ship.r * (2 / 3 * Math.sin(ship.a) - 0.5 * Math.cos(ship.a))
					);
					ctx.lineTo(
						ship.x - ship.r * (6 / 3 * Math.cos(ship.a)),
						ship.y + ship.r * (6 / 3 * Math.sin(ship.a))
					);
					ctx.lineTo(
						ship.x - ship.r * (2 / 3 * Math.cos(ship.a) - 0.5 * Math.sin(ship.a)),
						ship.y + ship.r * (2 / 3 * Math.sin(ship.a) + 0.5 * Math.cos(ship.a))
					);
					ctx.closePath();
					ctx.fill();
					ctx.stroke();
				}
			} else {
				ship.thrust.x -= FRICTION * ship.thrust.x / FPS;
				ship.thrust.y -= FRICTION * ship.thrust.y / FPS;
				fxThrust.stop();
			}

			// gemiyi çiz
			if (!exploding) {
				if (blinkOn && !ship.dead) {
					drawShip(ship.x, ship.y, ship.a);
				}
				if (ship.blinkNum > 0) {
					ship.blinkTime--;
					if (ship.blinkTime == 0) {
						ship.blinkTime = Math.ceil(SHIP_BLINK_DUR * FPS);
						ship.blinkNum--;
					}
				}
			} else {
				ctx.fillStyle = "darkred"; ctx.beginPath(); ctx.arc(ship.x, ship.y, ship.r * 1.7, 0, Math.PI * 2, false); ctx.fill();
				ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(ship.x, ship.y, ship.r * 1.4, 0, Math.PI * 2, false); ctx.fill();
				ctx.fillStyle = "orange"; ctx.beginPath(); ctx.arc(ship.x, ship.y, ship.r * 1.1, 0, Math.PI * 2, false); ctx.fill();
				ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(ship.x, ship.y, ship.r * 0.8, 0, Math.PI * 2, false); ctx.fill();
				ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(ship.x, ship.y, ship.r * 0.5, 0, Math.PI * 2, false); ctx.fill();
			}

			if (SHOW_BOUNDING) {
				ctx.strokeStyle = "lime";
				ctx.beginPath();
				ctx.arc(ship.x, ship.y, ship.r, 0, Math.PI * 2, false);
				ctx.stroke();
			}

			if (SHOW_CENTER_DOT) {
				ctx.fillStyle = "red";
				ctx.fillRect(ship.x - 1, ship.y - 1, 2, 2);
			}

			// lazerleri çiz
			for (var i = 0; i < ship.lasers.length; i++) {
				if (ship.lasers[i].explodeTime == 0) {
					ctx.fillStyle = fastFireTimer > 0 ? "yellow" : "salmon";
					ctx.beginPath();
					ctx.arc(ship.lasers[i].x, ship.lasers[i].y, SHIP_SIZE / 15, 0, Math.PI * 2, false);
					ctx.fill();
				} else {
					ctx.fillStyle = "orange"; ctx.beginPath(); ctx.arc(ship.lasers[i].x, ship.lasers[i].y, ship.r * 0.75, 0, Math.PI * 2, false); ctx.fill();
					ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(ship.lasers[i].x, ship.lasers[i].y, ship.r * 0.5, 0, Math.PI * 2, false); ctx.fill();
					ctx.fillStyle = "pink"; ctx.beginPath(); ctx.arc(ship.lasers[i].x, ship.lasers[i].y, ship.r * 0.25, 0, Math.PI * 2, false); ctx.fill();
				}
			}

			// --- CAN POWER-UP ---
			if (lifePowerUp) {
				drawLifePowerUp();
				lifePowerUp.timer--;
				if (lifePowerUp.timer <= 0) {
					lifePowerUp = null;
				} else if (!exploding && !ship.dead &&
					distBetweenPoints(ship.x, ship.y, lifePowerUp.x, lifePowerUp.y) < ship.r + lifePowerUp.r) {
					lives++;
					lifePowerUp = null;
					text = "+1 Can!";
					textAlpha = 1.0;
				}
			}

			// --- HIZLI ATES POWER-UP ---
			if (fastFirePowerUp) {
				drawFastFirePowerUp();
				fastFirePowerUp.timer--;
				if (fastFirePowerUp.timer <= 0) {
					fastFirePowerUp = null;
				} else if (!exploding && !ship.dead &&
					distBetweenPoints(ship.x, ship.y, fastFirePowerUp.x, fastFirePowerUp.y) < ship.r + fastFirePowerUp.r) {
					fastFireTimer = POWERUP_FAST_DUR * FPS;
					fastFirePowerUp = null;
					text = "Hizli Ates!";
					textAlpha = 1.0;
				}
			}
			if (fastFireTimer > 0) fastFireTimer--;

			// --- KALKAN POWER-UP ---
			if (shieldPowerUp) {
				drawShieldPowerUp();
				shieldPowerUp.timer--;
				if (shieldPowerUp.timer <= 0) {
					shieldPowerUp = null;
				} else if (!exploding && !ship.dead &&
					distBetweenPoints(ship.x, ship.y, shieldPowerUp.x, shieldPowerUp.y) < ship.r + shieldPowerUp.r) {
					shieldActive = true;
					shieldPowerUp = null;
					text = "Kalkan Aktif!";
					textAlpha = 1.0;
				}
			}

			// kalkan halkasını çiz
			if (shieldActive && !ship.dead) {
				ctx.beginPath();
				ctx.arc(ship.x, ship.y, ship.r * 1.5, 0, Math.PI * 2);
				ctx.strokeStyle = "cyan";
				ctx.lineWidth = 2;
				ctx.stroke();
			}

			// level yazısı
			if (textAlpha >= 0) {
				ctx.textAlign = "center";
				ctx.textBaseline = "middle";
				ctx.fillStyle = "rgba(255, 255, 255, " + textAlpha + ")";
				ctx.font = "small-caps " + TEXT_SIZE + "px dejavu sans mono";
				ctx.fillText(text, canv.width / 2, canv.height * 0.75);
				textAlpha -= (1.0 / TEXT_FADE_TIME / FPS);
			} else if (ship.dead) {
				newGame();
			}

			// canları çiz
			var lifeColour;
			for (var i = 0; i < lives; i++) {
				lifeColour = exploding && i == lives - 1 ? "red" : "white";
				drawShip(SHIP_SIZE + i * SHIP_SIZE * 1.2, SHIP_SIZE, 0.5 * Math.PI, lifeColour);
			}

			// hızlı ateş göstergesi
			if (fastFireTimer > 0) {
				ctx.textAlign = "left";
				ctx.textBaseline = "middle";
				ctx.fillStyle = "yellow";
				ctx.font = (TEXT_SIZE * 0.6) + "px dejavu sans mono";
				ctx.fillText("⚡ " + Math.ceil(fastFireTimer / FPS) + "s", SHIP_SIZE / 2, SHIP_SIZE * 2.5);
			}

			// puan
			ctx.textAlign = "right";
			ctx.textBaseline = "middle";
			ctx.fillStyle = "white";
			ctx.font = TEXT_SIZE + "px dejavu sans mono";
			ctx.fillText(score, canv.width - SHIP_SIZE / 2, SHIP_SIZE);

			// en yüksek puan
			ctx.textAlign = "center";
			ctx.textBaseline = "middle";
			ctx.fillStyle = "white";
			ctx.font = (TEXT_SIZE * 0.75) + "px dejavu sans mono";
			ctx.fillText("BEST " + scoreHigh, canv.width / 2, SHIP_SIZE);

			// lazer-astreoid çarpışma
			var ax, ay, ar, lx, ly;
			for (var i = roids.length - 1; i >= 0; i--) {
				ax = roids[i].x; ay = roids[i].y; ar = roids[i].r;
				for (var j = ship.lasers.length - 1; j >= 0; j--) {
					lx = ship.lasers[j].x; ly = ship.lasers[j].y;
					if (ship.lasers[j].explodeTime == 0 && distBetweenPoints(ax, ay, lx, ly) < ar) {
						destroyAsteroid(i);
						ship.lasers[j].explodeTime = Math.ceil(LASER_EXPLODE_DUR * FPS);
						break;
					}
				}
			}

			// gemi-astreoid çarpışma
			if (!exploding) {
				if (ship.blinkNum == 0 && !ship.dead) {
					for (var i = 0; i < roids.length; i++) {
						if (distBetweenPoints(ship.x, ship.y, roids[i].x, roids[i].y) < ship.r + roids[i].r) {
							if (shieldActive) {
								shieldActive = false;
								destroyAsteroid(i);
								text = "Kalkan Kirildi!";
								textAlpha = 1.0;
							} else {
								explodeShip();
								destroyAsteroid(i);
							}
							break;
						}
					}
				}

				ship.a += ship.rot;
				ship.x += ship.thrust.x;
				ship.y += ship.thrust.y;
			} else {
				ship.explodeTime--;
				if (ship.explodeTime == 0) {
					lives--;
					if (lives == 0) {
						gameOver();
					} else {
						ship = newShip();
					}
				}
			}

			// ekran köşeleri - gemi
			if (ship.x < 0 - ship.r) ship.x = canv.width + ship.r;
			else if (ship.x > canv.width + ship.r) ship.x = 0 - ship.r;
			if (ship.y < 0 - ship.r) ship.y = canv.height + ship.r;
			else if (ship.y > canv.height + ship.r) ship.y = 0 - ship.r;

			// lazer hareketi
			for (var i = ship.lasers.length - 1; i >= 0; i--) {
				if (ship.lasers[i].dist > LASER_DIST * canv.width) {
					ship.lasers.splice(i, 1);
					continue;
				}
				if (ship.lasers[i].explodeTime > 0) {
					ship.lasers[i].explodeTime--;
					if (ship.lasers[i].explodeTime == 0) {
						ship.lasers.splice(i, 1);
						continue;
					}
				} else {
					ship.lasers[i].x += ship.lasers[i].xv;
					ship.lasers[i].y += ship.lasers[i].yv;
					ship.lasers[i].dist += Math.sqrt(Math.pow(ship.lasers[i].xv, 2) + Math.pow(ship.lasers[i].yv, 2));
				}
				if (ship.lasers[i].x < 0) ship.lasers[i].x = canv.width;
				else if (ship.lasers[i].x > canv.width) ship.lasers[i].x = 0;
				if (ship.lasers[i].y < 0) ship.lasers[i].y = canv.height;
				else if (ship.lasers[i].y > canv.height) ship.lasers[i].y = 0;
			}

			// astreoit hareketi
			for (var i = 0; i < roids.length; i++) {
				roids[i].x += roids[i].xv;
				roids[i].y += roids[i].yv;
				if (roids[i].x < 0 - roids[i].r) roids[i].x = canv.width + roids[i].r;
				else if (roids[i].x > canv.width + roids[i].r) roids[i].x = 0 - roids[i].r;
				if (roids[i].y < 0 - roids[i].r) roids[i].y = canv.height + roids[i].r;
				else if (roids[i].y > canv.height + roids[i].r) roids[i].y = 0 - roids[i].r;
			}
		}
	</script>
